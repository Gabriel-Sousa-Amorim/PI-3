{% extends 'base.html' %}
{% load static %}

{% block title %}Alexandria | Entrar{% endblock %}

{% block content %}
<!-- Cards de Login/Cadastro -->
<section class="py-16 bg-neutral-50">
    <div class="container mx-auto px-5 max-w-5xl flex flex-col gap-5">
        <h1 class="text-indigo-600 text-3xl md:text-5xl font-bold text-neutral-800">
            Entrar
        </h1>
        <!-- Mensagens de feedback -->
        {% if messages %}
        <div class="mt-8 flex flex-col gap-5">
            {% for message in messages %}
            <div class="p-4 rounded-2xl {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                <i class="bi {% if message.tags == 'error' %}bi-exclamation-triangle{% elif message.tags == 'success' %}bi-check-circle{% else %}bi-info-circle{% endif %} mr-2"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="min-h-96 gap-8">
            
            <!-- CARD DE LOGIN -->
            <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-smooth overflow-hidden">
                <div class="p-6">
                    <form method="post" action="{% url 'auth_login' %}">
                        {% csrf_token %}
                        <input type="hidden" name="next" value="{{ next }}">
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-neutral-700 mb-2">
                                <i class="bi bi-envelope mr-1"></i> E-mail
                            </label>
                            <input type="email" name="email" required
                                   class="w-full px-4 py-2 border border-neutral-300 rounded-2xl focus:ring-indigo-500 focus:border-indigo-500"
                                   placeholder="seu@email.com">
                        </div>
                        
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-neutral-700 mb-2">
                                <i class="bi bi-lock mr-1"></i> Senha
                            </label>
                            <input type="password" name="password" id="login-password" required
                                   class="w-full px-4 py-2 border border-neutral-300 rounded-2xl focus:ring-indigo-500 focus:border-indigo-500"
                                   placeholder="••••••••">
                        </div>
                        
                        <!-- <div class="text-right mb-4">
                            <a href="#" class="text-sm text-indigo-600 hover:underline">Esqueceu a senha?</a>
                        </div> -->
                        
                        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-2xl font-semibold hover:bg-indigo-700 transition-smooth">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Validação de confirmação de senha
    const form = document.getElementById('cadastro-form');
    if (form) {
        form.addEventListener('submit', function(e) {
            const senha = document.getElementById('signup-password');
            const confirm = document.getElementById('password-confirm');
            
            if (senha.value !== confirm.value) {
                e.preventDefault();
                alert('As senhas não coincidem. Por favor, verifique.');
                confirm.classList.add('border-red-500');
                senha.classList.add('border-red-500');
            } else {
                senha.classList.remove('border-red-500');
                confirm.classList.remove('border-red-500');
            }
        });
    }
</script>
{% endblock %}
