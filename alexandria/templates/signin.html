{% extends 'base.html' %}
{% load static %}

{% block title %}Alexandria | Cadastrar{% endblock %}

{% block content %}
<!-- Cards de Login/Cadastro -->
<section class="py-16 bg-gray-50">
    
    <div class="container mx-auto px-5 max-w-5xl flex flex-col gap-5">
        <h1 class="text-3xl text-emerald-600 md:text-5xl font-bold">
            Cadastro
        </h1>
        <!-- Mensagens de feedback -->
        {% if messages %}
        <div class="mt-8">
            {% for message in messages %}
            <div
                class="p-4 rounded-2xl {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                <i
                    class="bi {% if message.tags == 'error' %}bi-exclamation-triangle{% elif message.tags == 'success' %}bi-check-circle{% else %}bi-info-circle{% endif %} mr-2"></i>
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}
        <div class="min-h-96 gap-8">

            <!-- CARD DE CADASTRO -->
            <div class="bg-white rounded-2xl shadow-lg hover:shadow-xl transition-smooth overflow-hidden">
                
                <div class="p-6">
                    <form method="post" action="{% url 'auth_signin' %}" id="cadastro-form">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-person mr-1"></i> Nome completo *
                            </label>
                            <input type="text" name="nome" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500"
                                placeholder="João Silva">
                        </div>

                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-envelope mr-1"></i> E-mail *
                            </label>
                            <input type="email" name="email" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500"
                                placeholder="seu@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-geo-alt mr-1"></i> Região *
                            </label>
                            <select name="regiao" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500">
                                <option value="">Selecione sua região</option>
                                <option value="NORTE 1">Norte 1</option>
                                <option value="NORTE 2">Norte 2</option>
                                <option value="LESTE 1">Leste 1</option>
                                <option value="LESTE 2">Leste 2</option>
                                <option value="SUL">Sul</option>
                                <option value="SUDESTE">Sudeste</option>
                                <option value="SUDOESTE">Sudoeste</option>
                                <option value="OESTE">Oeste</option>
                                <option value="CENTRO">Centro</option>
                                <option value="REGIAO METROPOLITANA">Região Metropolitana</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-building mr-1"></i> Cidade
                            </label>
                            <input type="text" name="cidade" value="São Paulo"
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500"
                                placeholder="São Paulo">
                        </div>

                        <div class="mb-3">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-lock mr-1"></i> Senha *
                            </label>
                            <input type="password" name="password" id="signup-password" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500"
                                placeholder="Mínimo 6 caracteres">
                        </div>

                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                <i class="bi bi-lock-fill mr-1"></i> Confirmar senha *
                            </label>
                            <input type="password" name="password_confirm" id="password-confirm" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-2xl focus:ring-emerald-500 focus:border-emerald-500"
                                placeholder="Digite a senha novamente">
                        </div>

                        <label class="flex items-center gap-2 mb-4">
                            <input type="checkbox" name="terms" required
                                class="rounded text-emerald-600 focus:ring-emerald-500">
                            <span class="text-sm text-gray-600">
                                Aceito os <a href="#" class="text-emerald-600 hover:underline">Termos de Uso</a>
                            </span>
                        </label>

                        <button type="submit"
                            class="w-full bg-emerald-600 text-white py-2 rounded-2xl font-semibold hover:bg-emerald-700 transition-smooth">
                            Criar conta gratuita
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    // Validação de confirmação de senha
    const form = document.getElementById('cadastro-form');
    if (form) {
        form.addEventListener('submit', function (e) {
            const senha = document.getElementById('signup-password');
            const confirm = document.getElementById('password-confirm');

            if (senha.value !== confirm.value) {
                e.preventDefault();
                alert('As senhas não coincidem. Por favor, verifique.');
                confirm.classList.add('border-red-500');
                senha.classList.add('border-red-500');
            } else {
                senha.classList.remove('border-red-500');
                confirm.classList.remove('border-red-500');
            }
        });
    }
</script>
{% endblock %}
